name: Release

on:
  push:
    branches: [beta]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
            label: macos-arm64
          - platform: macos-15-intel
            args: ''
            label: macos-x86_64
          - platform: windows-latest
            args: ''
            label: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.label }}

      - name: Install dependencies
        run: npm ci

      - name: Install sherpa-onnx static libs (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          wget -q https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.12.9/sherpa-onnx-v1.12.9-osx-universal2-static.tar.bz2
          tar xf sherpa-onnx-v1.12.9-osx-universal2-static.tar.bz2
          echo "SHERPA_LIB_PATH=$(pwd)/sherpa-onnx-v1.12.9-osx-universal2-static" >> $GITHUB_ENV
          echo "SHERPA_BUILD_SHARED_LIBS=0" >> $GITHUB_ENV

      - name: Install sherpa-onnx shared libs (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          $ProgressPreference = 'SilentlyContinue'
          # Use shared libs on Windows (static has unresolved ETW/registry symbols in sherpa-rs-sys)
          Invoke-WebRequest -Uri "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.12.9/sherpa-onnx-v1.12.9-win-x64-shared.tar.bz2" -OutFile "sherpa-shared.tar.bz2"
          tar.exe xf sherpa-shared.tar.bz2
          $sherpaPath = "$pwd\sherpa-onnx-v1.12.9-win-x64-shared"
          echo "SHERPA_LIB_PATH=$sherpaPath" >> $env:GITHUB_ENV
          # Disable static feature via env
          echo "SHERPA_BUILD_SHARED_LIBS=1" >> $env:GITHUB_ENV

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        with:
          tagName: v__VERSION__
          releaseName: 'PopTalk v__VERSION__'
          releaseBody: 'Voir les assets pour telecharger et installer cette version.'
          releaseDraft: false
          prerelease: ${{ github.ref_type != 'tag' }}
          args: ${{ matrix.args }}
