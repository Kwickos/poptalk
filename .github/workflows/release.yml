name: Release

on:
  push:
    branches: [beta]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
            label: macos-arm64
          - platform: macos-15-intel
            args: ''
            label: macos-x86_64
          - platform: windows-latest
            args: ''
            label: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.label }}

      - name: Install dependencies
        run: npm ci

      - name: Install sherpa-onnx static libs + cargs (Windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          # Download and extract sherpa-onnx static binaries
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.12.9/sherpa-onnx-v1.12.9-win-x64-static.tar.bz2" -OutFile "sherpa-static.tar.bz2"
          tar.exe xf sherpa-static.tar.bz2
          $sherpaPath = "$pwd\sherpa-onnx-v1.12.9-win-x64-static"
          echo "SHERPA_LIB_PATH=$sherpaPath" >> $env:GITHUB_ENV

          # Build cargs dependency and copy into sherpa lib dir
          git clone --depth 1 https://github.com/likle/cargs.git C:\cargs
          cd C:\cargs
          cmake -B build
          cmake --build build --config Release
          Copy-Item "build\Release\cargs.lib" -Destination "$sherpaPath\lib" -Force

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MACOSX_DEPLOYMENT_TARGET: "13.0"
          RUSTFLAGS: ${{ matrix.platform == 'windows-latest' && '-C target-feature=+crt-static' || '' }}
        with:
          tagName: v__VERSION__
          releaseName: 'PopTalk v__VERSION__'
          releaseBody: 'Voir les assets pour telecharger et installer cette version.'
          releaseDraft: false
          prerelease: ${{ github.ref_type != 'tag' }}
          args: ${{ matrix.args }}
