name: Release

on:
  push:
    branches: [beta]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macos-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            label: macos-x86_64
          - platform: windows-latest
            args: ''
            label: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.label }}

      - name: Install dependencies
        run: npm ci

      - name: Install cargs (Windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          git clone --depth 1 https://github.com/likle/cargs.git C:\cargs
          cd C:\cargs
          cmake -B build
          cmake --build build --config Release
          Copy-Item build\Release\cargs.lib -Destination "$env:USERPROFILE\.cargo" -Force
          echo "LIB=$env:USERPROFILE\.cargo;$env:LIB" >> $env:GITHUB_ENV

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        with:
          tagName: v__VERSION__
          releaseName: 'PopTalk v__VERSION__'
          releaseBody: 'Voir les assets pour telecharger et installer cette version.'
          releaseDraft: false
          prerelease: ${{ github.ref_type != 'tag' }}
          args: ${{ matrix.args }}
