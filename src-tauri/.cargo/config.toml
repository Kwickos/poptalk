[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-Wl,-rpath,/usr/lib/swift"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-Wl,-rpath,/usr/lib/swift"]

[env]
# Use static sherpa-onnx on macOS to avoid dylib issues at runtime.
# CI overrides these via GITHUB_ENV. Windows CI uses shared libs instead.
SHERPA_LIB_PATH = { value = "~/Library/Application Support/poptalk/sherpa-onnx-static", force = false }
SHERPA_BUILD_SHARED_LIBS = { value = "0", force = false }
